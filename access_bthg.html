<script>
document.getElementById('bthgGateForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = this;
    var hp = form.querySelector('[name="botcheck"]');
    if (hp && hp.value) return;
    var btn = document.getElementById('gateBtn');
    var origText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Unlocking...';
    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: new FormData(form)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            window.location.href = 'https://www.amazon.com/dp/B0DJ26S6C6';
        } else { alert('Something went wrong. Please try again.'); }
    })
    .catch(function() { alert('Something went wrong. Please try again.'); })
    .finally(function() { btn.disabled = false; btn.textContent = origText; });
});
</script>
