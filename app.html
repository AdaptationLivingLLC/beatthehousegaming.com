<body>
    <!-- Restore the saved theme before first paint, so there's no flash
         of the wrong theme while js/ui-shell.js waits for DOMContentLoaded.
         Mirrors the bthg_settings key Storage.Settings reads/writes. -->
    <script>
    (function () {
        var theme = 'casino';
        try {
            var s = JSON.parse(localStorage.getItem('bthg_settings') || '{}');
            if (['casino', 'midnight', 'paper'].indexOf(s.theme) !== -1) theme = s.theme;
        } catch (e) {}
        document.body.dataset.theme = theme;
    })();
    </script>

    <!-- Status Strip: always-visible thin control bar (spin count, series
         state, bankroll, trinity level, theme button, stealth button from
         a later task). Collapses to a fixed 28px bar on phone landscape
         (see body.layout-phone-land rules in app.css) where the table
         takes over the rest of the screen. -->
    <div id="status-strip">
        <span class="ss-chip" id="ss-spins"><span class="ss-chip-label">SPIN</span><span class="ss-chip-value">0</span></span>
        <span class="ss-chip" id="ss-series"><span class="ss-chip-label">SERIES</span><span class="ss-chip-value">Setup</span></span>
        <span class="ss-chip" id="ss-bankroll"><span class="ss-chip-label">BANKROLL</span><span class="ss-chip-value">$0</span></span>
        <span class="ss-chip" id="ss-trinity"><span class="ss-chip-label">TRINITY</span><span class="ss-chip-value">1x</span></span>
        <!-- Compact mirror of the intel feed's pinned BET/HOLD/STOP signal
             (js/intel-feed.js BTHG.IntelFeed.setSignal). Stays visible in
             phone landscape where #intel-feed itself is hidden (see the
             layout-phone-land rules in css/app.css). -->
        <span class="ss-chip" id="ss-signal"><span class="ss-chip-label">SIGNAL</span><span class="ss-chip-value">--</span></span>
        <span class="ss-spacer"></span>
        <button id="btn-theme" class="ss-btn" type="button" title="Switch theme"><i class="fas fa-palette"></i></button>
    </div>

<!-- Cookie Consent Banner -->

    <button onclick="bthgDeclineConsent()" style="background:transparent;color:#888;border:1px solid #444;padding:0.5rem 1.25rem;margin-left:0.5rem;cursor:pointer;border-radius:4px;font-size:0.85rem;">Decline</button>
</div>
<script>
(function(){if(!localStorage.getItem('bthg_consent'))document.getElementById('consent-banner').style.display='block';})();
